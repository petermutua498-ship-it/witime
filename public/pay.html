<!DOCTYPE html>
<html>
    <head>
        <title>Pay</title>

        <style>
            body {
                font-family: Arial;
                background: #00bcd4;
                padding-top: 50px;
                text-align: center;
            }

            .box {
                background: white;
                padding: 20px;
                border-radius: 10px;
                display:inline-block;
            }

            input, button {
                width: 200px;
                padding: 10px;
                margin-top: 10px;
            }

            #codeBox {
                margin-top: 15px;
                display: none;
            }

            button {
                background: #2196f3;
                color: white;
                border: none;
                cursor: pointer;
            }
        </style>
    </head>
<body>
    <div class="box">
        <h3> Enter Phone</h3>

        <input type="text" id="phone" placeholder="2547xxxxxxxx" autocomplete="tel" required>

        <button id="payBtn">Pay</button>

        <p id="msg"></p>

        <div id="codeBox">
            <h4>Your Code</h4>
            <p id="code"></p>
            <p id="timer"></p>
        </div>
    </div>

    <script>
        
        const urlParams = new URLSearchParams(window.location.search);
        const packageId = urlParams.get("package");
        

        document.getElementById("payBtn").addEventListener("click", () => {

            console.log("Pay button clicked");

            const phone = document.getElementById("phone").value;

            console.log("Phone:", phone);
            console.log("Package:", packageId);

            if (!phone || !packageId) {
                alert("Missing details");
                return;
            }
            

            fetch("/stk", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    phone: phone,
                    amount: 1
                })
            })
            .then(res =>  res.json())
            .then(data => {

                if (data.code) {
                    
                    localStorage.setItem("wificode", data.code);

                    console.log("Redirectig to verify...")

                    window.location.href = "verify.html";
                } else {
                    alert(data.message);
                }
            });
  
        });

        const device = localStorage.getItem("device") || Math.random();
        localStorage.setItem("device", device);
        
    </script>

</body>

</html>
