<!DOCTYPE html>
<html>
    <head>
        <title>Pay</title>

        <style>
            body {
                font-family: Arial;
                background: #00bcd4;
                padding-top: 50px;
                text-align: center;
            }

            .box {
                background: white;
                padding: 20px;
                border-radius: 10px;
                display:inline-block;
            }

            input, button {
                width: 200px;
                padding: 10px;
                margin-top: 10px;
            }

            #codeBox {
                margin-top: 15px;
                display: none;
            }

            button {
                background: #2196f3;
                color: white;
                border: none;
                cursor: pointer;
            }
        </style>
    </head>
<body>
    <div class="box">
        <h3> Enter Phone</h3>

        <input type="text" id="phone" placeholder="2547xxxxxxxx" autocomplete="tel" required>

        <button onclick="pay()">Pay</button>

        <p id="msg"></p>

        <div id="codeBox">
            <h4>Your Code</h4>
            <p id="code"></p>
            <p id="timer"></p>
        </div>
    </div>

    <script>
        async function pay() {
            const phone = document.getElementById("phone").value;

            if (!phone) {
                alert("Enter phone number");
                return;
            }

            try{
                const res = await fetch("https://witime-o2tz.onrender.com/pay", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ phone })
                });

                const data = await res.json();

                console.log(data);

                if (data.success) {
                    alert("STK sent. Check your phone");
                } else {
                    alert(data.error || "Payment failed");
                }

            } catch (err) {
                alert("Network error");
            }
        }
    </script>

</body>

</html>
