<!DOCTYPE html>
<html>
    <head>
        <title>WITIME</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h2>WITIME PACKAGES</h2>

        <div class="packages">
            <div class="package" onclick="choose(5)">5kes - 1 Hour</div>
            <div class="package" onclick="choose(10)">10kes - 2 Hours</div>
            <div class="package" onclick="choose(25)">25kes - 3 Hours</div>
            <div class="package" onclick="choose(50)">50kes - 6 Hours</div>
            <div class="package" onclick="choose(70)">70kes - 12 Hours</div>
        </div>

        <script>
            let amount = localStorage.getItem("amount");

            window.onload =async function(){

                const res = await fetch("/session");
                const data = await res.json();

                if(data.active){
                    document.getElementById("timerBox").style.display="block";

                    startTimer(data.expires);

                    document.getElementById("verifyMsg").innerText = "Session restored";
                }

                if(amount){
                    document.getElementById("selectedPackage").innerText = "Selected Package: " + amount + "KES";
                }
            }

            function choose(amount){
                localStorage.setItem("amount", amount);
                window.location.href = "pay.html";
            }

            async function pay() {
                const phone = document.getElementById("phone").value;
                const btn = document.getElementById("payBtn");

                if(!phone){
                    document.getElementById("msg").innerText = "Enter phone number";
                    return;
                }

                btn.disabled = true;
                btn.innerText = "processing...";

                const res = await fetch("/pay", {
                    method:"POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({ phone, 
                    amount: localStorage.getItem("amount") })
                });

                const data = await res.json();

                document.getElementById("msg").innerText = data.message;

                btn.disabled = false;
                btn.innerText = "Pay";

            }

            async function verify() {
                const phone = document.getElementById("phone").value;
                const code=document.getElementById("code").value;

                const res=await fetch("/verify", {
                    method: "POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({phone,code})
                });

                const data=await res.json();
                document.getElementById("verifyMsg").innerText=data.message;

                if(data.expires){
                    document.getElementById("timerBox").style.display="block";

                    startTimer(data.expires);
                }
            }
        </script>
    </body>
</html>
